name: DocNest
description: Offline document scanner with smart organization
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  image: ^4.1.7

  # Edge detection & document scanning
  cunning_document_scanner: ^1.0.3

  # PDF generation
  pdf: ^3.10.8
  printing: ^5.12.0

  # Local database
  sqflite: ^2.3.2
  path_provider: ^2.1.2
  path: ^1.9.0

  # File operations
  share_plus: ^9.0.0
  open_filex: ^4.3.4
  file_picker: ^8.0.3

  # OCR (offline via Google ML Kit)
  google_mlkit_text_recognition: ^0.13.0

  # Local auth (biometrics/PIN)
  local_auth: ^2.1.8

  # UI & UX
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.19.0
  flutter_slidable: ^3.1.0
  lottie: ^3.1.0

  # Icons
  cupertino_icons: ^1.0.6
  material_symbols_icons: ^4.2755.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
